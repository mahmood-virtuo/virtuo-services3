name: Deploy Virtuo Services 3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            git config --global --add safe.directory /home/mahmood/web/virtuo-services3.167-233-103-0.sslip.io/public_html
            cd /home/mahmood/web/virtuo-services3.167-233-103-0.sslip.io/public_html
            git pull origin main